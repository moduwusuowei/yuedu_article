<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>五一去哪玩 幸运大转盘</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .title {
      font-size: 2.5rem;
      font-weight: bold;
      color: #1f2937;
      text-align: center;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .subtitle {
      font-size: 1.2rem;
      color: #4b5563;
      text-align: center;
      margin-bottom: 40px;
    }

    .wheel-container {
      position: relative;
      width: min(90vw, 600px);
      aspect-ratio: 1/1;
    }

    /* 转盘底层 */
    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      transition: transform 4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    /* 扇形切片 */
    .slice {
      position: absolute;
      top: 0;
      left: 50%;
      width: 50%;
      height: 50%;
      transform-origin: bottom left;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slice-text {
      position: absolute;
      left: 10%;
      top: 20%;
      font-size: min(4vw, 1.2rem);
      font-weight: 600;
      color: #1f2937;
      transform: rotate(45deg);
      white-space: nowrap;
    }

    /* 中心指针 */
    .pointer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -100%);
      width: 20px;
      height: 80px;
      background: #dc2626;
      clip-path: polygon(50% 0, 0 100%, 100% 100%);
      z-index: 10;
    }

    .center-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      background: #dc2626;
      border-radius: 50%;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(220, 38, 38, 0.4);
      user-select: none;
    }

    .center-circle:active {
      transform: translate(-50%, -50%) scale(0.95);
    }

    /* 弹窗 */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-content {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      max-width: 90%;
      width: 400px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    .modal-title {
      font-size: 1.8rem;
      font-weight: bold;
      color: #dc2626;
      margin-bottom: 20px;
    }

    .modal-text {
      font-size: 1.5rem;
      color: #1f2937;
      margin-bottom: 30px;
    }

    .modal-btn {
      padding: 12px 30px;
      background: #409eff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .modal-btn:hover {
      background: #338eef;
      transform: translateY(-2px);
    }

    /* 渐变色系（对应转盘切片） */
    .slice:nth-child(1) { background: #fef08a; }
    .slice:nth-child(2) { background: #fde68a; }
    .slice:nth-child(3) { background: #fcd34d; }
    .slice:nth-child(4) { background: #fbbf24; }
    .slice:nth-child(5) { background: #f59e0b; }
    .slice:nth-child(6) { background: #f97316; }
    .slice:nth-child(7) { background: #fb923c; }
    .slice:nth-child(8) { background: #fdba74; }
    .slice:nth-child(9) { background: #fed7aa; }
    .slice:nth-child(10) { background: #bfdbfe; }
    .slice:nth-child(11) { background: #93c5fd; }
    .slice:nth-child(12) { background: #60a5fa; }
    .slice:nth-child(13) { background: #3b82f6; }
    .slice:nth-child(14) { background: #2563eb; }
    .slice:nth-child(15) { background: #1d4ed8; }
    .slice:nth-child(16) { background: #e0e7ff; }
    .slice:nth-child(17) { background: #c7d2fe; }
    .slice:nth-child(18) { background: #a5b4fc; }
    .slice:nth-child(19) { background: #818cf8; }
    .slice:nth-child(20) { background: #6366f1; }
    .slice:nth-child(21) { background: #d1fae5; }
    .slice:nth-child(22) { background: #a7f3d0; }
    .slice:nth-child(23) { background: #6ee7b7; }
    .slice:nth-child(24) { background: #34d399; }
    .slice:nth-child(25) { background: #10b981; }
    .slice:nth-child(26) { background: #059669; }
    .slice:nth-child(27) { background: #fecaca; }
    .slice:nth-child(28) { background: #fca5a5; }
    .slice:nth-child(29) { background: #f87171; }
    .slice:nth-child(30) { background: #ef4444; }
    .slice:nth-child(31) { background: #dc2626; }
    .slice:nth-child(32) { background: #b91c1c; }
    .slice:nth-child(33) { background: #e5e7eb; }
    .slice:nth-child(34) { background: #d1d5db; }
    .slice:nth-child(35) { background: #9ca3af; }
    .slice:nth-child(36) { background: #6b7280; }
    .slice:nth-child(37) { background: #4b5563; }
    .slice:nth-child(38) { background: #374151; }
    .slice:nth-child(39) { background: #fce7f3; }
    .slice:nth-child(40) { background: #fbcfe8; }
    .slice:nth-child(41) { background: #f9a8d4; }
    .slice:nth-child(42) { background: #f472b6; }
    .slice:nth-child(43) { background: #ec4899; }
    .slice:nth-child(44) { background: #db2777; }
    .slice:nth-child(45) { background: #c4b5fd; }
    .slice:nth-child(46) { background: #a78bfa; }
    .slice:nth-child(47) { background: #8b5cf6; }
    .slice:nth-child(48) { background: #7c3aed; }
  </style>
</head>
<body>
  <h1 class="title">五一去哪里</h1>
  <p class="subtitle">转到哪，五一就去哪</p>

  <div class="wheel-container">
    <div class="wheel" id="wheel"></div>
    <div class="pointer"></div>
    <div class="center-circle" id="startBtn">开始抽奖</div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2 class="modal-title">🎉 恭喜中奖</h2>
      <p class="modal-text" id="resultText"></p>
      <button class="modal-btn" id="closeModal">再抽一次</button>
    </div>
  </div>

  <script>
    // 1. 转盘目的地列表（和图中完全一致）
    const destinations = [
      "深圳", "黑龙江", "长白山", "婺源", "九寨沟", "神农架", "稻城亚丁", "潮汕", "珠海", "成都", "洛阳", "烟台", "威海", "南京", "武汉",  "天水", "洛阳", "上海", "北京", "西安", "广州", "在家"
    ];

    const wheel = document.getElementById("wheel");
    const startBtn = document.getElementById("startBtn");
    const modal = document.getElementById("modal");
    const resultText = document.getElementById("resultText");
    const closeModal = document.getElementById("closeModal");

    let isSpinning = false;
    let currentAngle = 0;
    const sliceAngle = 360 / destinations.length; // 每个扇形的角度

    // 2. 动态生成转盘切片
    function initWheel() {
      wheel.innerHTML = "";
      destinations.forEach((item, index) => {
        const slice = document.createElement("div");
        slice.className = "slice";
        // 计算每个切片的旋转角度
        const rotate = sliceAngle * index;
        slice.style.transform = `rotate(${rotate}deg)`;

        const text = document.createElement("div");
        text.className = "slice-text";
        text.textContent = item;
        // 文字反向旋转，保证正向显示
        text.style.transform = `rotate(${90 - sliceAngle/2}deg)`;

        slice.appendChild(text);
        wheel.appendChild(slice);
      });
    }

    // 3. 转盘旋转逻辑
    function spinWheel() {
      if (isSpinning) return;
      isSpinning = true;
      startBtn.textContent = "旋转中...";

      // 随机生成最终角度（5-10圈 + 随机偏移）
      const randomDeg = Math.floor(Math.random() * 360) + 360 * (5 + Math.floor(Math.random() * 5));
      const targetAngle = currentAngle + randomDeg;

      // 设置CSS过渡，实现缓动效果
      wheel.style.transition = "transform 4s cubic-bezier(0.2, 0.8, 0.2, 1)";
      wheel.style.transform = `rotate(${targetAngle}deg)`;

      // 动画结束后计算结果
      setTimeout(() => {
        isSpinning = false;
        currentAngle = targetAngle % 360; // 更新当前角度
        startBtn.textContent = "开始抽奖";

        // 计算指针指向的切片
        const normalizedAngle = (360 - (currentAngle % 360)) % 360;
        const sliceIndex = Math.floor(normalizedAngle / sliceAngle);
        const result = destinations[sliceIndex];

        // 显示结果弹窗
        resultText.textContent = `五一就去：${result}！`;
        modal.style.display = "flex";
      }, 4000);
    }

    // 4. 事件绑定
    startBtn.addEventListener("click", spinWheel);
    closeModal.addEventListener("click", () => {
      modal.style.display = "none";
    });

    // 初始化转盘
    initWheel();
  </script>
</body>
</html>
