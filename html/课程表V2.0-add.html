<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程表 🦋</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Comic+Neue:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 主题1: 樱花粉 (女孩) - 默认 */
        :root,
        [data-theme="sakura"] {
            --primary-light: #FFE5F1;
            --primary-medium: #FFB6D9;
            --primary-dark: #FF69B4;
            --secondary-light: #E5D4FF;
            --secondary-medium: #C4A7E7;
            --accent: #B2F5EA;
            --text-dark: #5A3E5E;
            --text-light: #8B7A8E;
            --white: #FFFFFF;
            --shadow: 0 8px 32px rgba(255, 105, 180, 0.2);
            --shadow-hover: 0 12px 48px rgba(255, 105, 180, 0.3);
            --gradient-bg: linear-gradient(135deg, #FFE5F1 0%, #E5D4FF 50%, #B2F5EA 100%);
            --gradient-header: linear-gradient(135deg, #FF69B4 0%, #C4A7E7 50%, #FF69B4 100%);
            --gradient-btn: linear-gradient(135deg, #FF69B4 0%, #FF1493 100%);
        }

        /* 主题2: 梦幻紫 (女孩) */
        [data-theme="dream"] {
            --primary-light: #E8D5FF;
            --primary-medium: #C49BFF;
            --primary-dark: #9B59B6;
            --secondary-light: #F0E6FF;
            --secondary-medium: #D4A5FF;
            --accent: #FFD1DC;
            --text-dark: #4A3058;
            --text-light: #7A5A8E;
            --shadow: 0 8px 32px rgba(155, 89, 182, 0.2);
            --shadow-hover: 0 12px 48px rgba(155, 89, 182, 0.3);
            --gradient-bg: linear-gradient(135deg, #E8D5FF 0%, #F0E6FF 50%, #FFD1DC 100%);
            --gradient-header: linear-gradient(135deg, #9B59B6 0%, #D4A5FF 50%, #9B59B6 100%);
            --gradient-btn: linear-gradient(135deg, #9B59B6 0%, #8E44AD 100%);
        }

        /* 主题3: 彩虹糖 (女孩) */
        [data-theme="rainbow"] {
            --primary-light: #FFE5E5;
            --primary-medium: #FFB3B3;
            --primary-dark: #FF6B6B;
            --secondary-light: #FFF5CC;
            --secondary-medium: #FFE066;
            --accent: #C5F0A4;
            --text-dark: #5A4040;
            --text-light: #8B6A6A;
            --shadow: 0 8px 32px rgba(255, 107, 107, 0.2);
            --shadow-hover: 0 12px 48px rgba(255, 107, 107, 0.3);
            --gradient-bg: linear-gradient(135deg, #FFE5E5 0%, #FFF5CC 25%, #C5F0A4 50%, #B3E5FC 75%, #E5D5FF 100%);
            --gradient-header: linear-gradient(135deg, #FF6B6B 0%, #FFE066 25%, #4ECDC4 50%, #45B7D1 75%, #96CEB4 100%);
            --gradient-btn: linear-gradient(135deg, #FF6B6B 0%, #FFE066 100%);
        }

        /* 主题4: 深海蓝 (男孩) */
        [data-theme="ocean"] {
            --primary-light: #E3F2FD;
            --primary-medium: #90CAF9;
            --primary-dark: #2196F3;
            --secondary-light: #E0F7FA;
            --secondary-medium: #4DD0E1;
            --accent: #B2EBF2;
            --text-dark: #1A3A5C;
            --text-light: #5A7A9A;
            --shadow: 0 8px 32px rgba(33, 150, 243, 0.2);
            --shadow-hover: 0 12px 48px rgba(33, 150, 243, 0.3);
            --gradient-bg: linear-gradient(135deg, #E3F2FD 0%, #E0F7FA 50%, #B2EBF2 100%);
            --gradient-header: linear-gradient(135deg, #2196F3 0%, #4DD0E1 50%, #2196F3 100%);
            --gradient-btn: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
        }

        /* 主题5: 森林绿 (男孩) */
        [data-theme="forest"] {
            --primary-light: #E8F5E9;
            --primary-medium: #A5D6A7;
            --primary-dark: #4CAF50;
            --secondary-light: #F1F8E9;
            --secondary-medium: #AED581;
            --accent: #DCEDC8;
            --text-dark: #1B5E20;
            --text-light: #4A7A4E;
            --shadow: 0 8px 32px rgba(76, 175, 80, 0.2);
            --shadow-hover: 0 12px 48px rgba(76, 175, 80, 0.3);
            --gradient-bg: linear-gradient(135deg, #E8F5E9 0%, #F1F8E9 50%, #DCEDC8 100%);
            --gradient-header: linear-gradient(135deg, #4CAF50 0%, #AED581 50%, #4CAF50 100%);
            --gradient-btn: linear-gradient(135deg, #4CAF50 0%, #388E3C 100%);
        }

        /* 主题6: 太空灰 (男孩) */
        [data-theme="space"] {
            --primary-light: #ECEFF1;
            --primary-medium: #90A4AE;
            --primary-dark: #546E7A;
            --secondary-light: #F5F5F5;
            --secondary-medium: #BDBDBD;
            --accent: #B0BEC5;
            --text-dark: #263238;
            --text-light: #607D8B;
            --shadow: 0 8px 32px rgba(84, 110, 122, 0.2);
            --shadow-hover: 0 12px 48px rgba(84, 110, 122, 0.3);
            --gradient-bg: linear-gradient(135deg, #ECEFF1 0%, #F5F5F5 50%, #B0BEC5 100%);
            --gradient-header: linear-gradient(135deg, #546E7A 0%, #90A4AE 50%, #546E7A 100%);
            --gradient-btn: linear-gradient(135deg, #546E7A 0%, #37474F 100%);
        }

        /* 兼容旧变量名 */
        :root {
            --pink-light: var(--primary-light);
            --pink-medium: var(--primary-medium);
            --pink-dark: var(--primary-dark);
            --purple-light: var(--secondary-light);
            --purple-medium: var(--secondary-medium);
            --lavender: #E6E6FA;
            --mint: var(--accent);
            --peach: #FFDAB9;
            --yellow-light: #FFF9C4;
        }

        body {
            font-family: 'Noto Sans SC', 'Comic Neue', sans-serif;
            background: var(--gradient-bg);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            transition: background 0.5s ease;
        }

        /* 可爱装饰元素 */
        .decoration {
            position: fixed;
            pointer-events: none;
            z-index: 0;
        }

        .butterfly {
            font-size: 2rem;
            animation: float 6s ease-in-out infinite;
        }

        .butterfly:nth-child(1) {
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }

        .butterfly:nth-child(2) {
            top: 20%;
            right: 8%;
            animation-delay: 1s;
        }

        .butterfly:nth-child(3) {
            bottom: 15%;
            left: 10%;
            animation-delay: 2s;
        }

        .butterfly:nth-child(4) {
            bottom: 25%;
            right: 5%;
            animation-delay: 3s;
        }

        .flower {
            font-size: 1.5rem;
            animation: spin 20s linear infinite;
        }

        .flower:nth-child(5) {
            top: 30%;
            left: 3%;
        }

        .flower:nth-child(6) {
            top: 60%;
            right: 4%;
        }

        .flower:nth-child(7) {
            bottom: 10%;
            left: 15%;
        }

        .star {
            font-size: 1.2rem;
            animation: twinkle 2s ease-in-out infinite;
        }

        .star:nth-child(8) {
            top: 15%;
            left: 20%;
            animation-delay: 0.5s;
        }

        .star:nth-child(9) {
            top: 50%;
            right: 15%;
            animation-delay: 1s;
        }

        .star:nth-child(10) {
            bottom: 20%;
            right: 20%;
            animation-delay: 1.5s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(10deg);
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.2);
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 1rem;
            animation: fadeInDown 0.8s ease;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(255, 229, 241, 0.9) 100%);
            padding: 1rem;
            border-radius: 30px;
            box-shadow: var(--shadow);
            border: 3px solid var(--pink-medium);
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: var(--gradient-header);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            font-family: 'Comic Neue', 'Noto Sans SC', sans-serif;
        }

        .owner-name {
            font-size: 1.3rem;
            color: var(--pink-dark);
            font-weight: 600;
            margin: 0.5rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 1rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 2rem;
            animation: fadeInUp 0.8s ease;
        }

        /* 配置面板 */
        .config-panel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 229, 241, 0.95) 100%);
            border: 3px solid var(--pink-medium);
            border-radius: 30px;
            padding: 2rem;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .config-panel:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .config-panel h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--pink-dark);
            font-family: 'Comic Neue', 'Noto Sans SC', sans-serif;
            text-align: center;
        }

        .course-manager {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .add-course-section {
            display: flex;
            gap: 0.5rem;
        }

        .add-course-section input {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 2px solid var(--pink-medium);
            border-radius: 15px;
            font-size: 0.95rem;
            font-family: 'Noto Sans SC', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        .add-course-section input:focus {
            border-color: var(--pink-dark);
            box-shadow: 0 0 0 3px rgba(255, 105, 180, 0.2);
        }

        .btn-add {
            background: var(--gradient-btn);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 0 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 105, 180, 0.5);
        }

        .course-list-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            max-height: 400px;
            overflow-y: auto;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            border: 2px dashed var(--pink-light);
        }

        .course-tag {
            background: white;
            padding: 0.5rem 0.8rem;
            border-radius: 12px;
            font-size: 0.9rem;
            color: var(--text-dark);
            border: 2px solid var(--pink-light);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            animation: fadeIn 0.3s ease;
        }

        .course-tag:hover {
            border-color: var(--pink-medium);
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
        }

        .course-delete-btn {
            width: 18px;
            height: 18px;
            background: var(--pink-light);
            color: var(--pink-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }

        .course-delete-btn:hover {
            background: var(--pink-dark);
            color: white;
            transform: scale(1.1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* 激励语输入 */
        .motivation-section {
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.6);
            padding: 1.5rem;
            border-radius: 20px;
            border: 2px dashed var(--mint);
        }

        .motivation-section h3 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: var(--pink-dark);
            font-family: 'Comic Neue', 'Noto Sans SC', sans-serif;
            text-align: center;
        }

        .motivation-input {
            margin-bottom: 0;
        }

        .motivation-input label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .motivation-input textarea {
            width: 100%;
            padding: 0.9rem 1rem;
            background: white;
            border: 2px solid var(--mint);
            border-radius: 15px;
            color: var(--text-dark);
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-family: 'Noto Sans SC', sans-serif;
            resize: vertical;
            min-height: 60px;
        }

        .motivation-input textarea:focus {
            outline: none;
            border-color: #4facfe;
            background: rgba(178, 245, 234, 0.2);
            box-shadow: 0 0 0 4px rgba(79, 172, 254, 0.2);
            transform: scale(1.02);
        }

        .motivation-input textarea::placeholder {
            color: var(--text-light);
        }

        .motivation-controls {
            display: flex;
            gap: 0.5rem;
            align-items: flex-start;
        }

        .motivation-controls textarea {
            flex: 1;
        }

        .dice-btn {
            padding: 0.9rem 1rem;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: 2px solid #FFB6D9;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(255, 215, 0, 0.3);
            min-width: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dice-btn:hover {
            transform: translateY(-3px) scale(1.1);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.5);
        }

        .dice-btn:active {
            animation: diceRoll 0.5s ease;
        }

        @keyframes diceRoll {
            0% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(90deg) scale(1.1);
            }

            50% {
                transform: rotate(180deg) scale(1.2);
            }

            75% {
                transform: rotate(270deg) scale(1.1);
            }

            100% {
                transform: rotate(360deg) scale(1);
            }
        }

        /* 按钮 */
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            flex: 1;
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .btn-save {
            background: var(--gradient-btn);
            color: white;
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.4);
        }

        .btn-save:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 30px rgba(255, 105, 180, 0.6);
        }

        .btn-clear {
            background: linear-gradient(135deg, #C4A7E7 0%, #9370DB 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(196, 167, 231, 0.4);
        }

        .btn-clear:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 30px rgba(196, 167, 231, 0.6);
        }

        .btn-print {
            background: linear-gradient(135deg, var(--primary-medium) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(255, 182, 217, 0.4);
            padding: 1rem 10rem; /* 左右padding从2rem增加到10rem，长度变为3倍 */
            border: none;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-print:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 30px rgba(255, 182, 217, 0.6);
        }

        /* 预览面板 */
        .preview-panel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(229, 212, 255, 0.95) 100%);
            border: 3px solid var(--purple-medium);
            border-radius: 30px;
            padding: 2rem;
            box-shadow: var(--shadow);
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .preview-header h2 {
            font-size: 1.5rem;
            color: var(--purple-medium);
            font-family: 'Comic Neue', 'Noto Sans SC', sans-serif;
        }

        /* 课程表样式 */
        .schedule-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .schedule-table th,
        .schedule-table td {
            padding: 1rem;
            text-align: center;
            border: 2px solid var(--pink-light);
        }

        .schedule-table th {
            background: linear-gradient(135deg, var(--pink-medium) 0%, var(--purple-light) 100%);
            font-weight: 700;
            color: var(--text-dark);
            font-size: 1rem;
        }

        .schedule-table td {
            background: white;
            color: var(--text-dark);
            transition: all 0.3s ease;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .schedule-table td:hover {
            background: var(--pink-light);
            transform: scale(1.05);
            box-shadow: 0 3px 10px rgba(255, 105, 180, 0.2);
        }

        .schedule-table td.rest-cell {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary-medium) 100%);
            color: var(--pink-dark);
            font-weight: 700;
        }

        .schedule-table td.course-cell {
            background: linear-gradient(135deg, #E5D4FF 0%, #C4A7E7 100%);
            color: var(--text-dark);
            font-weight: 600;
        }

        .schedule-table td.empty-cell {
            color: var(--text-light);
            font-style: italic;
        }

        /* 开关样式 */
        .switch {
            position: relative;
            display: inline-block;
            margin: 0 10px;
            cursor: pointer;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 40px;
            height: 20px;
            background-color: #ccc;
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background: linear-gradient(135deg, var(--primary-medium) 0%, var(--primary-dark) 100%);
        }

        input:focus + .slider {
            box-shadow: 0 0 1px var(--primary-dark);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .switch-label {
            margin-left: 50px;
            font-size: 0.9rem;
            color: var(--text-dark);
        }

        /* 打印控制区域样式 */
        .print-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .weekend-switches {
            display: flex;
            align-items: center;
        }

        /* 打印样式 */
        .print-only {
            display: none;
        }

        @media print {
            body {
                background: white;
                color: black;
            }

            .container {
                display: none;
            }

            .decoration {
                display: none;
            }

            .print-only {
                display: block;
                padding: 15mm;
            }

            .print-header {
                text-align: center;
                margin-bottom: 20px;
                border-bottom: 3px solid #FF69B4;
                padding-bottom: 15px;
                position: relative;
            }

            .print-header h1 {
                font-size: 26pt;
                color: #FF69B4;
                margin-bottom: 8px;
                font-family: 'Comic Neue', 'Noto Sans SC', sans-serif;
            }

            .print-owner {
                font-size: 14pt;
                color: #C4A7E7;
                font-weight: bold;
                margin: 8px 0;
            }

            .print-decorations {
                position: absolute;
                font-size: 20pt;
            }

            .print-decorations.left {
                left: 0;
                top: 0;
            }

            .print-decorations.right {
                right: 0;
                top: 0;
            }

            .schedule-table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 10px;
                page-break-inside: avoid;
            }

            .schedule-table th,
            .schedule-table td {
                border: 2px solid #FFB6D9;
                padding: 10px 5px;
                text-align: center;
            }

            .schedule-table th {
                background: #FFE5F1 !important;
                font-weight: bold;
                font-size: 11pt;
                color: #5A3E5E !important;
            }

            .schedule-table td {
                font-size: 10pt;
                min-height: 35px;

        // 渲染课程表
        function renderSchedule() {
            const container = document.getElementById('schedulePreview');
            
            // 获取开关状态
            const showSaturday = document.getElementById('showSaturday')?.checked !== false;
            const showSunday = document.getElementById('showSunday')?.checked !== false;

            let html = '<table class="schedule-table">';

            // 表头
            html += '<thead><tr>';
            html += '<th>时间</th>';
            for (let day in dayMap) {
                // 根据开关状态过滤周六和周日
                if ((day === 'saturday' && !showSaturday) || (day === 'sunday' && !showSunday)) {
                    continue;
                }
                html += `<th>${dayMap[day]}</th>`;
            }
            html += '</tr></thead>';

            // 表体
            html += '<tbody>';

            // 根据periodCount渲染所有课程节
            for (let i = 0; i < periodCount; i++) {
                html += '<tr>';
                // 时间单元格 - 可点击
                const timeStr = getTimeDisplayStr(i);
                html += `<td class="time-cell" data-period-index="${i}"><strong>第${i + 1}节</strong>${timeStr}</td>`;
                for (let day in scheduleData) {
                    // 根据开关状态过滤周六和周日
                    if ((day === 'saturday' && !showSaturday) || (day === 'sunday' && !showSunday)) {
                        continue;
                    }
                    const course = scheduleData[day].courses[i] || '';
                    const cellClass = course ? 'course-cell clickable-cell' : 'empty-cell clickable-cell';
                    const displayText = course || '-';
                    html += `<td class="${cellClass}" data-day="${day}" data-index="${i}">${displayText}</td>`;
                }
                html += '</tr>';
            }

            html += '</tbody></table>';
            
            // 添加开关状态到表格，用于打印时的样式控制
            container.setAttribute('data-saturday-visible', showSaturday);
            container.setAttribute('data-sunday-visible', showSunday);

            // 添加课程节数控制按钮
            html += `
                <div class="period-controls" style="display: flex; justify-content: center; gap: 1rem; margin-top: 1rem;">
                    <button class="btn btn-period-remove" id="removePeriodBtn" style="padding: 0.5rem 1rem; font-size: 0.9rem; background: linear-gradient(135deg, var(--secondary-medium) 0%, var(--secondary-light) 100%); border: 2px solid var(--primary-medium); border-radius: 15px; cursor: pointer; color: var(--text-dark); font-weight: 600;">➖ 减少一节</button>
                    <span style="display: flex; align-items: center; font-weight: 600; color: var(--text-dark);">共 ${periodCount} 节课</span>
                    <button class="btn btn-period-add" id="addPeriodBtn" style="padding: 0.5rem 1rem; font-size: 0.9rem; background: linear-gradient(135deg, var(--primary-medium) 0%, var(--primary-dark) 100%); border: 2px solid var(--primary-medium); border-radius: 15px; cursor: pointer; color: white; font-weight: 600;">➕ 新增一节</button>
                </div>
            `;

            container.innerHTML = html;

            // 添加单元格点击事件
            addCellClickListeners();
            // 添加时间单元格点击事件
            addTimeCellClickListeners();
            // 添加课程节数控制事件
            addPeriodControlListeners();
        }

        // 添加课程节数控制事件
        function addPeriodControlListeners() {
            document.getElementById('addPeriodBtn').addEventListener('click', () => {
                if (periodCount < 12) {
                    periodCount++;
                    // 确保所有天的数据数组长度足够
                    for (let day in scheduleData) {
                        while (scheduleData[day].courses.length < periodCount) {
                            scheduleData[day].courses.push('');
                        }
                    }
                    // 确保periodTimes数组长度足够
                    while (periodTimes.length < periodCount) {
                        periodTimes.push({ start: '', end: '' });
                    }
                    saveToLocalStorage();
                    renderSchedule();

                    showNotification(`➕ 已添加第${periodCount}节课`);
                } else {
                    showNotification('⚠️ 最多支持12节课');
                }
            });

            document.getElementById('removePeriodBtn').addEventListener('click', () => {
                if (periodCount > 1) {
                    periodCount--;
                    saveToLocalStorage();
                    renderSchedule();

                    showNotification(`➖ 已删除最后一节课`);
                } else {
                    showNotification('⚠️ 至少需要1节课');
                }
            });
        }

        function loadFromLocalStorage() {
            // 尝试加载v3版数据
            let saved = localStorage.getItem('scheduleData_v3');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (parsed.scheduleData) {
                        // 合并课程数据
                        for (let day in parsed.scheduleData) {
                            if (scheduleData[day] && parsed.scheduleData[day].courses) {
                                scheduleData[day].courses = parsed.scheduleData[day].courses;
                            }
                        }
                    }
                    motivationText = parsed.motivationText || '学习很苦,坚持很酷';
                    ownerName = parsed.ownerName || '小可爱';
                    currentTheme = parsed.currentTheme || 'sakura';
                    periodCount = parsed.periodCount || 8;
                    if (parsed.periodTimes) {
                        periodTimes = parsed.periodTimes;
                    }
                    if (parsed.courseList && Array.isArray(parsed.courseList)) {
                        courseList = parsed.courseList;
                    }
                    document.getElementById('motivationText').value = motivationText;
                } catch (e) {
                    console.error('加载数据失败:', e);
                }
                return;
            }

            // 兼容v2版本数据
            saved = localStorage.getItem('scheduleData_v2');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    motivationText = parsed.motivationText || '学习很苦,坚持很酷';
                    ownerName = parsed.ownerName || '小可爱';
                    currentTheme = parsed.currentTheme || 'sakura';
                    if (parsed.periodTimes) {
                        periodTimes = parsed.periodTimes;
                    }
                    // 尝试迁移旧数据格式
                    if (parsed.scheduleData) {
                        for (let day in parsed.scheduleData) {
                            const oldData = parsed.scheduleData[day];
                            if (oldData.morning && oldData.afternoon) {
                                scheduleData[day].courses = [...oldData.morning, ...oldData.afternoon];
                            } else if (oldData.courses) {
                                scheduleData[day].courses = oldData.courses;
                            }
                        }
                    }
                    document.getElementById('motivationText').value = motivationText;
                } catch (e) {
                    console.error('加载数据失败:', e);
                }
                return;
            }

            // 兼容最旧版本数据
            saved = localStorage.getItem('scheduleData_mengzhongqi');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (parsed.scheduleData) {
                        for (let day in parsed.scheduleData) {
                            const oldData = parsed.scheduleData[day];
                            if (oldData.morning && oldData.afternoon) {
                                scheduleData[day].courses = [...oldData.morning, ...oldData.afternoon];
                            }
                        }
                        motivationText = parsed.motivationText || '学习很苦,坚持很酷';
                    }
                    document.getElementById('motivationText').value = motivationText;
                } catch (e) {
                    console.error('加载数据失败:', e);
                }
            }
        }

        // 显示通知
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.className = 'notification-toast';
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: linear-gradient(135deg, var(--primary-dark) 0%, var(--secondary-medium) 100%);
                color: white;
                padding: 1rem 1.5rem;
                border-radius: 20px;
                box-shadow: var(--shadow);
                z-index: 10000;
                font-weight: 700;
                animation: slideInRight 0.3s ease;
                border: 2px solid white;
            `;

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideOutRight 0.3s ease';
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }

        // ========== 名字编辑功能 ==========
        function showNameEdit() {
            document.getElementById('ownerNameDisplay').style.display = 'none';
            document.getElementById('nameInputContainer').classList.add('active');
            const input = document.getElementById('nameInput');
            input.value = ownerName;
            input.focus();
            input.select();
        }

        function confirmNameEdit() {
            const input = document.getElementById('nameInput');
            const newName = input.value.trim();
            if (newName) {
                ownerName = newName;
                updateOwnerNameDisplay();
                saveToLocalStorage();
                showNotification('✅ 名字已更新！');
            }
            document.getElementById('nameInputContainer').classList.remove('active');
            document.getElementById('ownerNameDisplay').style.display = 'flex';
        }

        function updateOwnerNameDisplay() {
            const theme = themeDecorations[currentTheme];
            document.getElementById('ownerNameText').textContent = ownerName;
            document.getElementById('ownerIcon').textContent = theme.icon;
            document.getElementById('ownerDecor').textContent = theme.decor;
            // 更新页面标题
            document.title = `${ownerName}的课程表 🦋`;
            // 更新打印区域
            document.getElementById('printOwnerName').textContent = `${theme.icon} ${ownerName} ${theme.decor}`;
            document.getElementById('printDecorLeft').textContent = theme.printLeft;
            document.getElementById('printDecorRight').textContent = theme.printRight;
        }

        // 名字输入框的键盘事件
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('nameInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    confirmNameEdit();
                } else if (e.key === 'Escape') {
                    document.getElementById('nameInputContainer').classList.remove('active');
                    document.getElementById('ownerNameDisplay').style.display = 'flex';
                }
            });
        });

        // ========== 主题切换功能 ==========
        function initThemeEvents() {
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const theme = btn.dataset.theme;
                    applyTheme(theme);
                    saveToLocalStorage();
                    showNotification('🎨 主题已切换！');
                });
            });
        }

        function applyTheme(theme) {
            currentTheme = theme;
            // 设置主题
            document.body.setAttribute('data-theme', theme);
            // 更新主题按钮状态
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.theme === theme);
            });
            // 更新装饰元素
            updateDecorations();
            // 更新名字显示
            updateOwnerNameDisplay();
        }

        function updateDecorations() {
            const theme = themeDecorations[currentTheme];
            const decorations = document.querySelectorAll('.decoration');
            decorations.forEach((dec, index) => {
                const itemIndex = index % theme.items.length;
                dec.textContent = theme.items[itemIndex];
            });
        }

        // ========== 时间编辑功能 ==========
        function initTimeModalEvents() {
            document.getElementById('confirmTimeBtn').addEventListener('click', confirmTimeEdit);
            document.getElementById('clearTimeBtn').addEventListener('click', clearTimeEdit);
            document.getElementById('cancelTimeBtn').addEventListener('click', closeTimeModal);

            document.getElementById('timeModalOverlay').addEventListener('click', (e) => {
                if (e.target.id === 'timeModalOverlay') {
                    closeTimeModal();
                }
            });
        }

        function openTimeModal(index) {
            currentTimeIndex = index;
            document.getElementById('timePeriodInfo').textContent = `第${index + 1}节`;

            const time = periodTimes[index];
            document.getElementById('timeStart').value = time.start || '08:00';
            document.getElementById('timeEnd').value = time.end || '08:45';

            document.getElementById('timeModalOverlay').classList.add('active');
        }

        function closeTimeModal() {
            document.getElementById('timeModalOverlay').classList.remove('active');
            currentTimeIndex = -1;
        }

        function confirmTimeEdit() {
            if (currentTimeIndex < 0) return;

            const startTime = document.getElementById('timeStart').value;
            const endTime = document.getElementById('timeEnd').value;

            periodTimes[currentTimeIndex] = { start: startTime, end: endTime };
            saveToLocalStorage();
            renderSchedule();
            closeTimeModal();
            showNotification('⏰ 时间已设置！');
        }

        function clearTimeEdit() {
            if (currentTimeIndex < 0) return;

            periodTimes[currentTimeIndex] = { start: '', end: '' };
            saveToLocalStorage();
            renderSchedule();
            closeTimeModal();
            showNotification('🗑️ 时间已清空！');
        }
    </script>
</body>

</html>
